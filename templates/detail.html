<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTENT_TITLE - Basic Computer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        .detail-page { min-height: 100vh; padding-bottom: 40px; }
        .detail-header { padding: 20px 40px; background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .detail-header-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .detail-logo { display: flex; align-items: center; gap: 12px; font-size: 1.4rem; font-weight: 700; }
        .detail-nav { display: flex; gap: 8px; }
        .detail-nav a { color: rgba(255,255,255,0.7); text-decoration: none; padding: 10px 20px; border-radius: 10px; transition: all 0.3s; font-weight: 500; }
        .detail-nav a:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .detail-main { max-width: 900px; margin: 0 auto; padding: 40px; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.6); text-decoration: none; margin-bottom: 30px; transition: color 0.3s; }
        .back-link:hover { color: #fff; }
        .content-type-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 20px; font-size: 0.85rem; margin-bottom: 20px; }
        .content-title { font-family: 'Space Grotesk', sans-serif; font-size: 2.5rem; margin-bottom: 15px; line-height: 1.2; }
        .content-meta { display: flex; gap: 20px; color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-bottom: 30px; }
        .content-body { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 40px; }
        .content-section { margin-bottom: 25px; }
        .content-section h3 { color: #fff; font-size: 1.2rem; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .content-section p { color: rgba(255,255,255,0.8); line-height: 1.8; font-size: 1rem; }
        .content-section ul { margin: 15px 0; padding-left: 25px; }
        .content-section li { color: rgba(255,255,255,0.75); margin-bottom: 10px; line-height: 1.6; }
        .key-concepts { background: rgba(102,126,234,0.1); border: 1px solid rgba(102,126,234,0.3); border-radius: 15px; padding: 25px; margin-top: 30px; }
        .key-concepts h3 { color: #667eea !important; margin-bottom: 15px !important; }
        .concept-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .concept-tag { padding: 8px 16px; background: rgba(255,255,255,0.1); border-radius: 20px; font-size: 0.85rem; color: rgba(255,255,255,0.8); }
    </style>
</head>
<body>
    <div class="hero-bg">
        <div class="grid-pattern"></div>
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
        </div>
    </div>
    <div class="detail-page">
        <div class="detail-header">
            <div class="detail-header-inner">
                <div class="detail-logo">
                    <span>💻</span> Basic Computer
                </div>
                <div class="detail-nav">
                    <a href="/dashboard">Dashboard</a>
                    <a href="/content">Content</a>
                    <a href="/payment">Subscribe</a>
                    <a href="/profile">Profile</a>
                    <a href="/logout">Logout</a>
                </div>
            </div>
        </div>
        <div class="detail-main">
            <a href="/content" class="back-link">← Back to Study Materials</a>
            
            <div class="content-type-badge">CONTENT_ICON CONTENT_TYPE</div>
            <h1 class="content-title">CONTENT_TITLE</h1>
            <div class="content-meta">
                <span>📂 CONTENT_CATEGORY</span>
                <span>👁️ CONTENT_VIEWS views</span>
                <span>⭐ CONTENT_RATING rating</span>
            </div>
            
            <div class="content-body">
                <div class="content-section">
                    <h3>📖 Overview</h3>
                    <p>CONTENT_DESCRIPTION</p>
                </div>
                
                <div class="content-section">
                    <h3>📚 Key Concepts</h3>
                    <p>CONTENT_BODY</p>
                </div>
                
                <div class="key-concepts">
                    <h3>🎯 Learning Points</h3>
                    <div class="concept-tags">
                        CONCEPT_TAGS
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
